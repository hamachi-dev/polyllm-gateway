listen:
  openai: ":8000"
  anthropic: ":8001"

providers:
  opencode:
    endpoint: https://api.opencode.ai/v1
    api_key: ${OPENCODE_API_KEY}

routes:
  gpt-5:
    provider: opencode
    model: qwen3.7-plus
    api: openai

  gpt-5-mini:
    provider: opencode
    model: deepseek-v4-flash
    api: openai

  claude-sonnet-4:
    provider: opencode
    model: deepseek-v4-flash
    api: anthropic
